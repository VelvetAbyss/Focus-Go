name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 1. Install dependencies (cached on CI) ──────────────────
      - name: Install dependencies
        run: npm ci

      # ── 2. Build web app on CI (fast machines, not the server) ──
      - name: Build web app
        run: npm run build:web
        env:
          VITE_API_BASE: https://api.nestflow.art
          VITE_REDIRECT_URI: https://app.nestflow.art/

      # ── 3. Pack dist into a single tarball ──────────────────────
      - name: Package dist
        run: tar czf dist.tar.gz -C apps/web/dist .

      # ── 4. Upload tarball to Alibaba OSS (CI → OSS) ─────────────
      # Transfer to OSS is fast; server then pulls from OSS (same HK
      # region), avoiding the slow US GitHub → HK server SCP path.
      - name: Install rclone
        run: sudo apt-get install -y rclone

      - name: Upload dist to OSS
        env:
          RCLONE_CONFIG_ALIYUNOSS_TYPE: s3
          RCLONE_CONFIG_ALIYUNOSS_PROVIDER: Alibaba
          RCLONE_CONFIG_ALIYUNOSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          RCLONE_CONFIG_ALIYUNOSS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          RCLONE_CONFIG_ALIYUNOSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          rclone copyto dist.tar.gz \
            aliyunoss:${{ secrets.OSS_BUCKET }}/deploys/dist-${{ github.sha }}.tar.gz \
            --no-check-dest

      # ── 5. Server pulls from OSS + symlink + reload ─────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            echo "=== [0] kill any stale deploy processes ==="
            pkill -f "deploy.sh" || true
            pkill -f "npm ci" || true
            sleep 2
            echo "=== [1] pull dist from OSS ==="
            rclone copyto \
              aliyunoss:${{ secrets.OSS_BUCKET }}/deploys/dist-${{ github.sha }}.tar.gz \
              /tmp/dist-${{ github.sha }}.tar.gz \
              --timeout 120s --contimeout 30s
            echo "=== [2] unpack dist ==="
            mkdir -p /tmp/focus-go-dist-${{ github.sha }}
            tar xzf /tmp/dist-${{ github.sha }}.tar.gz -C /tmp/focus-go-dist-${{ github.sha }}
            rm -f /tmp/dist-${{ github.sha }}.tar.gz
            rclone delete aliyunoss:${{ secrets.OSS_BUCKET }}/deploys/dist-${{ github.sha }}.tar.gz || true
            echo "=== [3] run deploy script ==="
            bash /root/focus-go/deploy.sh production /tmp/focus-go-dist-${{ github.sha }}
