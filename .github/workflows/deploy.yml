name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 1. Install dependencies (cached on CI) ──────────────────
      - name: Install dependencies
        run: npm ci

      # ── 2. Build web app on CI (fast machines, not the server) ──
      - name: Build web app
        run: npm run build:web
        env:
          VITE_API_BASE: https://api.nestflow.art
          VITE_REDIRECT_URI: https://app.nestflow.art/

      # ── 3. Pack dist into a single tarball (1 file >> 100 files over SCP) ──
      - name: Package dist
        run: tar czf /tmp/dist-${{ github.sha }}.tar.gz -C apps/web/dist .

      # ── 4. Upload single tarball to server ──────────────────────
      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: /tmp/dist-${{ github.sha }}.tar.gz
          target: /tmp/

      # ── 5. Unpack + symlink + reload (lightweight SSH, < 30s) ───
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            mkdir -p /tmp/focus-go-dist-${{ github.sha }}
            tar xzf /tmp/dist-${{ github.sha }}.tar.gz -C /tmp/focus-go-dist-${{ github.sha }}
            rm -f /tmp/dist-${{ github.sha }}.tar.gz
            bash /root/focus-go/deploy.sh production /tmp/focus-go-dist-${{ github.sha }}
