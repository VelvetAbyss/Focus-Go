name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 1. Install dependencies (cached on CI) ──────────────────
      - name: Install dependencies
        run: npm ci

      # ── 2. Build web app on CI (fast machines, not the server) ──
      - name: Build web app
        run: npm run build:web
        env:
          VITE_API_BASE: https://api.nestflow.art
          VITE_REDIRECT_URI: https://app.nestflow.art/

      # ── 3. Pack dist into a single tarball ──────────────────────
      - name: Package dist
        run: tar czf dist.tar.gz -C apps/web/dist .

      # ── 4. Upload tarball to Alibaba OSS ────────────────────────
      # Use OSS_ENDPOINT secret — bucket may not be in HK region.
      - name: Install rclone
        run: sudo apt-get install -y rclone

      - name: Upload dist to OSS
        env:
          RCLONE_CONFIG_ALIYUNOSS_TYPE: s3
          RCLONE_CONFIG_ALIYUNOSS_PROVIDER: Alibaba
          RCLONE_CONFIG_ALIYUNOSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          RCLONE_CONFIG_ALIYUNOSS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          RCLONE_CONFIG_ALIYUNOSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          rclone copyto dist.tar.gz \
            aliyunoss:${{ secrets.OSS_BUCKET }}/deploys/dist-${{ github.sha }}.tar.gz \
            --no-check-dest

      # ── 5. Configure SSH ────────────────────────────────────────
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # StrictHostKeyChecking=no in ssh command, so no keyscan needed
          echo "SSH configured"

      # ── 6. Deploy on server (native ssh → real-time output) ─────
      # Pass OSS credentials inline via rclone :s3: on-the-fly remote.
      # This bypasses the server's rclone config (which only knows HK),
      # so the server can download from whichever region the bucket is in.
      - name: Deploy on server
        timeout-minutes: 20
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o ConnectTimeout=30 \
            "$SERVER_USER@$SERVER_HOST" \
            "OSS_BUCKET='$OSS_BUCKET' OSS_ENDPOINT='$OSS_ENDPOINT' OSS_KEY_ID='$OSS_KEY_ID' OSS_KEY_SECRET='$OSS_KEY_SECRET' GIT_SHA='$GIT_SHA' bash -s" << 'DEPLOY'
          set -euo pipefail

          echo "=== [0/4] kill any stale deploy processes ==="
          pkill -f "deploy.sh" 2>/dev/null || true
          pkill -f "npm ci" 2>/dev/null || true
          sleep 2

          echo "=== [1/4] pull dist from OSS ==="
          # Use :s3: on-the-fly remote so we don't depend on server rclone config
          rclone copyto \
            ":s3,provider=Alibaba,access_key_id=${OSS_KEY_ID},secret_access_key=${OSS_KEY_SECRET},endpoint=${OSS_ENDPOINT}:${OSS_BUCKET}/deploys/dist-${GIT_SHA}.tar.gz" \
            "/tmp/dist-${GIT_SHA}.tar.gz" \
            --timeout 120s --contimeout 30s --stats-one-line --stats 15s

          echo "=== [2/4] unpack dist ==="
          mkdir -p "/tmp/focus-go-dist-${GIT_SHA}"
          tar xzf "/tmp/dist-${GIT_SHA}.tar.gz" -C "/tmp/focus-go-dist-${GIT_SHA}"
          rm -f "/tmp/dist-${GIT_SHA}.tar.gz"

          echo "=== [3/4] run deploy.sh ==="
          bash /root/focus-go/deploy.sh production "/tmp/focus-go-dist-${GIT_SHA}"

          echo "=== [4/4] deploy complete ==="
          DEPLOY
